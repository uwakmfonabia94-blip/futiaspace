<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  
  <!-- Primary SEO Meta -->
  <title>FutiaSpace – The Official FUTIA Campus Network</title>
  <meta name="description" content="Connect with FUTIA students, sell items in the marketplace, and stay updated with campus activity. The official student network for Federal University of Technology, Ikot Abasi." />
  <meta name="keywords" content="FUTIA, Federal University of Technology Ikot Abasi, campus network, student marketplace, FUTIA directory, student community, Nigeria university" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://futiaspace.com.ng" />

  <!-- Open Graph / Social Sharing -->
  <meta property="og:title" content="FutiaSpace – The Official FUTIA Campus Network" />
  <meta property="og:description" content="Connect with classmates, buy and sell on the marketplace, and stay updated with campus activity." />
  <meta property="og:url" content="https://futiaspace.com.ng" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://futiaspace.com.ng/icon-512.png" />

  <!-- Schema.org Structured Data (critical for Google) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "FutiaSpace",
    "url": "https://futiaspace.com.ng",
    "description": "The official campus network for FUTIA students. Connect, buy and sell, and stay informed.",
    "applicationCategory": "SocialNetworkingApplication"
  }
  </script>

  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />

  <!-- PWA / Mobile meta -->
  <meta name="theme-color" content="#0F172A" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FutiaSpace" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Cropper.js for avatar cropping -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
