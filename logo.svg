<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="FutiaSpace logo">
  <title>FutiaSpace</title>

  <!-- Brand background — purple rounded square -->
  <rect width="100" height="100" rx="22" ry="22" fill="#6C63FF"/>

  <!-- F lettermark — vertical bar -->
  <rect x="22" y="21" width="14" height="58" rx="2.5" ry="2.5" fill="#FFFFFF"/>

  <!-- F lettermark — top horizontal bar -->
  <rect x="22" y="21" width="48" height="14" rx="2.5" ry="2.5" fill="#FFFFFF"/>

  <!-- F lettermark — middle horizontal bar -->
  <rect x="22" y="47" width="35" height="13" rx="2.5" ry="2.5" fill="#FFFFFF"/>

  <!-- Space accent — three subtle dots bottom-right -->
  <circle cx="76" cy="73" r="3.5" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="85" cy="65" r="2.5" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="82" cy="80" r="2"   fill="#FFFFFF" opacity="0.25"/>
</svg>